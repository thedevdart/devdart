{% extends 'inventory/base.html' %}
{% load static %}

{% block content %}
<div id="env-data" class="hidden"
     data-csrf="{{ csrf_token }}"
     data-create-url="{% url 'template_builder_create' %}">
</div>

<script id="centers-data" type="application/json">{{ centers_json|safe }}</script>
<script id="templates-data" type="application/json">{{ templates_json|safe }}</script>

<div class="max-w-[100rem] mx-auto py-4 font-sans relative flex flex-col h-[calc(100vh-2rem)] min-h-[700px]">
    
    <div id="toast" class="absolute bottom-5 right-5 z-[150] hidden transition-all duration-300 transform translate-y-full opacity-0">
        <div class="bg-brand text-white px-5 py-4 rounded-md shadow-2xl flex items-start gap-4 min-w-[320px] max-w-sm border-l-4 border-red-500">
            <i id="toast-icon" class="fa-solid fa-xmark text-red-500 text-lg mt-0.5"></i>
            <div class="flex-1">
                <h4 id="toast-title" class="font-black text-[11px] text-slate-50 uppercase tracking-widest">Error</h4>
                <p id="toast-msg" class="text-xs font-medium text-slate-300 mt-1"></p>
            </div>
        </div>
    </div>
    
    <div class="flex flex-col md:flex-row md:justify-between md:items-end gap-5 mb-6 shrink-0">
        <div>
            <a href="{% url 'template_builder_list' %}" class="text-slate-500 dark:text-slate-400 hover:text-primary text-[10px] font-black uppercase tracking-widest mb-3 inline-flex items-center gap-2 transition-colors">
                <i class="fa-solid fa-arrow-left"></i> Back to Templates
            </a>
            <h1 class="text-3xl md:text-4xl font-black text-slate-900 dark:text-white tracking-tighter flex items-center gap-3 uppercase font-heading">
                <i class="fa-solid fa-wand-magic-sparkles text-primary"></i>
                Create Master Template
            </h1>
            <p class="text-xs text-slate-500 dark:text-slate-400 font-bold mt-2 uppercase tracking-widest">Select source Centers or existing Templates to extract a unified master list</p>
        </div>
    </div>
    
    <div class="flex-1 min-h-0 flex flex-col relative pb-4">
        
        <div class="bg-white dark:bg-slate-900 rounded-md shadow-sm border border-slate-200 dark:border-slate-800 flex flex-col h-fit max-h-full w-full max-w-4xl overflow-hidden transition-colors duration-300">
            
            <div class="p-6 md:p-8 space-y-8 overflow-y-auto custom-scrollbar flex-1 min-h-0">
                
                <div>
                    <label class="block text-[10px] font-black text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-2 ml-1">Template Name <span class="text-red-500">*</span></label>
                    <input type="text" id="templateNameInput" placeholder="e.g. UNIVERSAL HD FORMAT" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-md px-5 py-4 text-slate-900 dark:text-white font-black text-[11px] uppercase tracking-widest outline-none focus:ring-1 focus:ring-primary focus:border-primary shadow-inner transition-all placeholder:text-slate-400">
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-3 ml-1">Center Data Sources</label>
                    
                    <div class="flex flex-wrap gap-2 mb-4 bg-slate-100 dark:bg-slate-950 p-1.5 rounded-sm w-max border border-slate-200 dark:border-slate-800">
                        <button onclick="window.TemplateCreateApp.selectAllCenters()" class="px-4 py-2 text-[9px] font-black uppercase tracking-widest rounded-sm hover:bg-white dark:hover:bg-slate-800 hover:shadow-sm transition-all text-slate-600 dark:text-slate-300">All Centers</button>
                        <button onclick="window.TemplateCreateApp.selectCategory('HD')" class="px-4 py-2 text-[9px] font-black uppercase tracking-widest rounded-sm hover:bg-white dark:hover:bg-slate-800 hover:shadow-sm transition-all text-slate-600 dark:text-slate-300">HD Only</button>
                        <button onclick="window.TemplateCreateApp.selectCategory('LD')" class="px-4 py-2 text-[9px] font-black uppercase tracking-widest rounded-sm hover:bg-white dark:hover:bg-slate-800 hover:shadow-sm transition-all text-slate-600 dark:text-slate-300">LD Only</button>
                        <div class="w-px bg-slate-300 dark:bg-slate-700 mx-1 my-1"></div>
                        <button onclick="window.TemplateCreateApp.clearAll()" class="px-4 py-2 text-[9px] font-black uppercase tracking-widest rounded-sm hover:bg-red-50 dark:hover:bg-red-500/10 hover:shadow-sm transition-all text-red-500">Clear</button>
                    </div>

                    <div id="centers-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3 max-h-72 overflow-y-auto custom-scrollbar pr-2">
                        </div>
                </div>

                <div id="templates-wrapper">
                    <label class="block text-[10px] font-black text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-3 ml-1">Merge with Existing Templates</label>
                    <div id="templates-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3 max-h-48 overflow-y-auto custom-scrollbar pr-2">
                        </div>
                </div>
                
            </div>
            
            <div class="p-6 border-t border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 shrink-0">
                <button id="submitBtn" onclick="window.TemplateCreateApp.submitTemplate()" class="w-full bg-primary text-white font-black py-4 rounded-md shadow-md hover:bg-primary/90 transition-all flex items-center justify-center gap-2 text-[11px] uppercase tracking-widest active:scale-[0.99] border border-transparent">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                    Generate Master Template
                </button>
            </div>

        </div>
    </div>
</div>

<script src="{% static 'inventory/js/template_create.js' %}?v=1.0"></script>
{% endblock %}
