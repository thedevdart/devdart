{% extends 'inventory/base.html' %}

{% block content %}
<div class="max-w-6xl mx-auto py-4 font-sans relative space-y-6">
    
    <div class="flex flex-col md:flex-row md:justify-between md:items-end gap-4 mb-2">
        <div>
            <h1 class="text-2xl font-bold text-slate-900 dark:text-white tracking-tight flex items-center gap-3">
                <span class="bg-emerald-100 dark:bg-emerald-900/50 text-emerald-600 dark:text-emerald-400 p-2 rounded-lg transition-colors"><i class="fa-brands fa-whatsapp text-lg"></i></span>
                WhatsApp Tracker
            </h1>
            <p class="text-sm text-slate-500 dark:text-slate-400 mt-2 transition-colors">Live synchronized receipt tracking across all users.</p>
        </div>
        
        <div class="flex flex-wrap items-center gap-3">
            <div class="relative">
                <input type="date" id="trackerDate" onchange="fetchLiveStatus()" class="p-2.5 pl-3 pr-4 border border-slate-300 dark:border-slate-600 rounded-xl bg-white dark:bg-slate-800 font-semibold text-sm text-slate-700 dark:text-slate-200 outline-none focus:ring-2 focus:ring-emerald-500 dark:focus:ring-emerald-400 transition-colors shadow-sm cursor-pointer">
            </div>
            
            <button onclick="fetchLiveStatus()" id="refreshBtn" class="bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-700 font-semibold py-2.5 px-4 rounded-xl shadow-sm transition-all flex items-center gap-2 text-sm focus:ring-2 focus:ring-emerald-500">
                <i class="fa-solid fa-arrows-rotate text-slate-400 dark:text-slate-500"></i> Refresh
            </button>

            <button onclick="copyMissing()" class="bg-slate-900 dark:bg-emerald-600 text-white font-medium py-2.5 px-5 rounded-xl shadow-sm hover:bg-slate-800 dark:hover:bg-emerald-700 transition-all flex items-center gap-2 text-sm focus:ring-2 focus:ring-slate-900 dark:focus:ring-emerald-500 focus:ring-offset-2 dark:focus:ring-offset-slate-900">
                <i class="fa-regular fa-copy"></i> Copy Remaining
            </button>
        </div>
    </div>

    <div class="bg-slate-50 dark:bg-slate-900/30 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 transition-colors duration-300">
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4" id="centerGrid">
            {% for center in centers %}
            <button data-id="{{ center.id }}" 
                    data-name="{{ center.name }}" 
                    onclick="toggleStatus(this)" 
                    class="center-btn py-5 px-3 rounded-xl border-2 transition-all duration-200 shadow-sm flex flex-col items-center justify-center gap-2 relative overflow-hidden group focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2 dark:focus:ring-offset-slate-900">
                
                <div class="btn-spinner absolute inset-0 bg-white/80 dark:bg-slate-800/80 flex items-center justify-center hidden backdrop-blur-sm z-10">
                    <i class="fa-solid fa-circle-notch fa-spin text-emerald-500 text-2xl"></i>
                </div>

                <i class="fa-solid fa-clock status-icon text-2xl mb-1 transition-all duration-300 group-hover:scale-110"></i>
                <span class="text-[13px] font-bold text-center leading-tight tracking-wide">{{ center.name }}</span>
            </button>
            {% endfor %}
        </div>
    </div>

</div>

<div id="copy-toast" class="fixed bottom-5 right-5 z-50 hidden transition-all duration-300 transform translate-y-full opacity-0">
    <div class="bg-slate-900 dark:bg-slate-800 text-white px-5 py-4 rounded-xl shadow-2xl flex items-start gap-4 min-w-[320px] max-w-sm ring-1 ring-white/10 dark:ring-slate-700 border-l-4 border-emerald-500">
        <i class="fa-solid fa-circle-check text-xl text-emerald-400 mt-0.5"></i>
        <div class="flex-1">
            <h4 class="font-semibold text-sm text-slate-50">List Copied!</h4>
            <p class="text-sm text-slate-300 mt-1">Ready to paste in WhatsApp.</p>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const d = new Date();
        d.setDate(d.getDate() - 1);
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        document.getElementById('trackerDate').value = `${yyyy}-${mm}-${dd}`;
        
        fetchLiveStatus();
    });

    // Theme-aware classes for toggling
    const receivedClasses = ['bg-emerald-50', 'dark:bg-emerald-500/10', 'border-emerald-400', 'dark:border-emerald-500/50', 'text-emerald-700', 'dark:text-emerald-400', 'received'];
    const missingClasses = ['bg-white', 'dark:bg-slate-800', 'border-slate-200', 'dark:border-slate-700', 'text-slate-600', 'dark:text-slate-300', 'hover:border-slate-300', 'dark:hover:border-slate-500'];

    async function fetchLiveStatus() {
        const dateVal = document.getElementById('trackerDate').value;
        const refreshBtn = document.getElementById('refreshBtn');
        const icon = refreshBtn.querySelector('i');
        
        if(!dateVal) return;

        icon.classList.add('fa-spin');

        try {
            const res = await fetch(`/inventory/api/whatsapp/status/?date=${dateVal}`);
            const data = await res.json();
            const receivedIds = data.received_ids || [];

            const buttons = document.querySelectorAll('.center-btn');
            buttons.forEach(btn => {
                const centerId = parseInt(btn.dataset.id);
                const btnIcon = btn.querySelector('.status-icon');

                if (receivedIds.includes(centerId)) {
                    // Mark Received
                    btn.classList.remove(...missingClasses);
                    btn.classList.add(...receivedClasses);
                    
                    btnIcon.classList.replace('fa-clock', 'fa-check-circle');
                    btnIcon.classList.remove('text-slate-300', 'dark:text-slate-600');
                    btnIcon.classList.add('text-emerald-500', 'dark:text-emerald-400');
                } else {
                    // Mark Missing
                    btn.classList.remove(...receivedClasses);
                    btn.classList.add(...missingClasses);
                    
                    btnIcon.classList.replace('fa-check-circle', 'fa-clock');
                    btnIcon.classList.remove('text-emerald-500', 'dark:text-emerald-400');
                    btnIcon.classList.add('text-slate-300', 'dark:text-slate-600');
                }
            });
        } catch (e) {
            console.error("Failed to sync:", e);
        } finally {
            icon.classList.remove('fa-spin');
        }
    }

    async function toggleStatus(btn) {
        const centerId = btn.dataset.id;
        const dateVal = document.getElementById('trackerDate').value;
        const spinner = btn.querySelector('.btn-spinner');
        
        if(!dateVal) {
            alert("Please select a date first.");
            return;
        }

        spinner.classList.remove('hidden');

        try {
            const res = await fetch(`/inventory/api/whatsapp/toggle/`, {
                method: 'POST',
                headers: {
                    'X-CSRFToken': '{{ csrf_token }}',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    center_id: centerId,
                    date: dateVal
                })
            });

            const data = await res.json();
            
            if (data.status === 'success') {
                fetchLiveStatus(); 
            } else {
                alert("Error: " + data.message);
            }
        } catch (e) {
            alert("Network Error: Could not save.");
        } finally {
            spinner.classList.add('hidden');
        }
    }

    function copyMissing() {
        let missing = [];
        const buttons = document.querySelectorAll('.center-btn');
        
        buttons.forEach(btn => {
            if (!btn.classList.contains('received')) {
                missing.push(btn.dataset.name);
            }
        });

        let textToCopy = "";
        if (missing.length === 0) {
            textToCopy = "All center reports have been received today! ✅";
        } else {
            textToCopy = "Remaining Centers:\n";
            missing.forEach(name => {
                textToCopy += `${name}\n`;
            });
        }

        navigator.clipboard.writeText(textToCopy).then(() => {
            const toast = document.getElementById('copy-toast');
            toast.classList.remove('hidden');
            
            // Allow display block to apply before animating
            setTimeout(() => {
                toast.classList.remove('translate-y-full', 'opacity-0');
            }, 10);
            
            setTimeout(() => { 
                toast.classList.add('translate-y-full', 'opacity-0');
                setTimeout(() => toast.classList.add('hidden'), 300);
            }, 3000);
        });
    }
</script>
{% endblock %}
