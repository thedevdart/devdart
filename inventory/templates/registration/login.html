<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LT Nexus</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-blue-700">📦 LT Nexus</h1>
            <p class="text-slate-500 mt-2">Please sign in to continue</p>
        </div>

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            
            <div class="mb-4">
                <label class="block text-sm font-bold text-slate-700 mb-2">Username</label>
                <input type="text" name="username" class="w-full border border-slate-300 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Enter username" required autofocus>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-bold text-slate-700 mb-2">Password</label>
                <input type="password" name="password" class="w-full border border-slate-300 p-3 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Enter password" required>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition shadow-lg">
                Sign In
            </button>
            
            <input type="hidden" name="next" value="{{ next }}">
        </form>

        {% if form.errors %}
            <div class="mt-4 p-3 bg-red-50 text-red-600 text-sm rounded text-center border border-red-200">
                Invalid username or password.
            </div>
        {% endif %}
    </div>

</body>
</html>
