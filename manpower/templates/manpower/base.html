{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Manpower</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: {} } }
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else { document.documentElement.classList.remove('dark'); }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 5px; height: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #475569; }
        main.custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; }
        main.custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark main.custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
        .dark main.custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 font-sans text-slate-800 dark:text-slate-200 antialiased selection:bg-emerald-100 dark:selection:bg-emerald-900 selection:text-emerald-900 dark:selection:text-emerald-100 transition-colors duration-300">

    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-slate-900 flex-shrink-0 hidden md:flex flex-col border-r border-slate-800 z-20 shadow-xl">
            <div class="h-20 flex items-center px-6 border-b border-slate-800/60 bg-slate-900/50">
                <div class="flex items-center gap-3 w-full">
                    <div class="w-9 h-9 rounded-xl bg-emerald-500/10 border border-emerald-500/20 flex items-center justify-center overflow-hidden flex-shrink-0">
                        <i class="fa-solid fa-users-gear text-emerald-400 text-lg"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h1 class="text-[17px] font-bold text-white tracking-tight truncate">LT Nexus</h1>
                        <p class="text-[10px] text-emerald-400 uppercase tracking-widest font-semibold mt-0.5">Manpower</p>
                    </div>
                </div>
            </div>

            <nav class="flex-1 px-4 py-6 space-y-1.5 overflow-y-auto custom-scrollbar">
                <p class="px-3 text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-3 mt-2">Operations</p>
                
                <a href="{% url 'manpower_dashboard' %}" class="flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all duration-200 group {% if request.resolver_match.url_name == 'manpower_dashboard' %}bg-emerald-600 text-white shadow-md shadow-emerald-900/20{% else %}text-slate-400 hover:bg-slate-800/60 hover:text-white{% endif %}">
                    <i class="fa-solid fa-clipboard-user w-5 text-center text-lg {% if request.resolver_match.url_name != 'manpower_dashboard' %}group-hover:text-emerald-400 transition-colors{% endif %}"></i>
                    <span class="text-sm font-medium">Extract Attendance</span>
                </a>
                <a href="{% url 'manpower_directory' %}" class="flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all duration-200 group {% if request.resolver_match.url_name == 'manpower_directory' %}bg-emerald-600 text-white shadow-md shadow-emerald-900/20{% else %}text-slate-400 hover:bg-slate-800/60 hover:text-white{% endif %}">
    <i class="fa-solid fa-address-book w-5 text-center text-lg {% if request.resolver_match.url_name != 'manpower_directory' %}group-hover:text-emerald-400 transition-colors{% endif %}"></i>
    <span class="text-sm font-medium">Workers Directory</span>
</a>
<div class="pt-4 pb-2">
    <div class="h-px w-full bg-slate-800/60"></div>
</div>
<p class="px-3 text-[11px] font-bold text-slate-500 uppercase tracking-wider mb-3">Analytics</p>

<a href="{% url 'contractors_hub' %}" class="flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all duration-200 group {% if request.resolver_match.url_name == 'contractors_hub' %}bg-emerald-600 text-white shadow-md shadow-emerald-900/20{% else %}text-slate-400 hover:bg-slate-800/60 hover:text-white{% endif %}">
    <i class="fa-solid fa-chart-simple w-5 text-center text-lg {% if request.resolver_match.url_name != 'contractors_hub' %}group-hover:text-emerald-400 transition-colors{% endif %}"></i>
    <span class="text-sm font-medium">Contractor Hub</span>
</a>
<a href="{% url 'centers_hub' %}" class="flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all duration-200 group {% if request.resolver_match.url_name == 'centers_hub' %}bg-emerald-600 text-white shadow-md shadow-emerald-900/20{% else %}text-slate-400 hover:bg-slate-800/60 hover:text-white{% endif %}">
    <i class="fa-solid fa-chart-line w-5 text-center text-lg {% if request.resolver_match.url_name != 'centers_hub' %}group-hover:text-emerald-400 transition-colors{% endif %}"></i>
    <span class="text-sm font-medium">Facility Analytics</span>
</a>    
                
                </nav>

            <div class="p-4 border-t border-slate-800 bg-slate-900/80">
                <button onclick="toggleTheme()" class="w-full flex items-center justify-between px-3 py-2.5 mb-3 rounded-xl bg-slate-800/40 border border-slate-700/50 hover:bg-slate-800 transition-colors group">
                    <span class="text-xs font-semibold text-slate-400 group-hover:text-slate-200 transition-colors" id="theme-text">Toggle Theme</span>
                    <div class="w-8 h-8 rounded-lg bg-slate-700/50 flex items-center justify-center text-slate-300"><i id="theme-icon" class="fa-solid fa-moon"></i></div>
                </button>

                <a href="{% url 'nexus_hub' %}" class="flex items-center gap-3 px-3 py-2.5 rounded-xl hover:bg-slate-800 transition-colors group border border-transparent hover:border-slate-700/50">
                    <div class="w-9 h-9 rounded-lg bg-gradient-to-br from-emerald-500 to-teal-600 flex items-center justify-center font-bold text-sm text-white shadow-inner flex-shrink-0">
                        <i class="fa-solid fa-layer-group"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-semibold text-slate-200 truncate capitalize group-hover:text-white transition-colors">Nexus Hub</p>
                        <p class="text-[10px] text-emerald-400 truncate font-medium">Switch Workspaces</p>
                    </div>
                    <i class="fa-solid fa-chevron-right text-slate-600 text-xs group-hover:text-slate-400 transition-colors"></i>
                </a>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto custom-scrollbar p-8">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script>
        const themeIcon = document.getElementById('theme-icon');
        const themeText = document.getElementById('theme-text');
        if (document.documentElement.classList.contains('dark')) {
            themeIcon.className = 'fa-solid fa-sun text-amber-400';
            themeText.innerText = 'Light Mode';
        }
        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
                themeIcon.className = 'fa-solid fa-moon text-emerald-400';
                themeText.innerText = 'Dark Mode';
            } else {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
                themeIcon.className = 'fa-solid fa-sun text-amber-400';
                themeText.innerText = 'Light Mode';
            }
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
